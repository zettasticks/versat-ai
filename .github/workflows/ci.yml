name: CI

# Set default shell as interactive (source ~/.bashrc)
defaults:
  run:
    shell: bash -ieo pipefail {0}

# Run only one instance of this workflow at a time
# cancel-in-progress: stop running workflow and run latest instead
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: '*'
  pull_request:
    branches: '*'
  # Allow manual workflow runs
  workflow_dispatch:

jobs:

  test1:
    runs-on: self-hosted
    timeout-minutes: 10
    if: ${{ !cancelled() }}
    needs: []

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
      - name: Clean untracked files and directories (like old submodules)
        run: git clean -ffdx
      - name: run Generated pc-emul
        run: |
          make clean;\
          make pc-emul-run
      - name: run Generated sim
        run: |
          make clean;\
          make sim-run

  test2:
    runs-on: self-hosted
    timeout-minutes: 10
    if: ${{ !cancelled() }}
    needs: []

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
      - name: Clean untracked files and directories (like old submodules)
        run: git clean -ffdx
      - name: run Softmax pc-emul
        run: |
          make clean;\
          make pc-emul-run TEST=Softmax
      - name: run Generated sim
        run: |
          make clean;\
          make sim-run TEST=Softmax

  test3:
    runs-on: self-hosted
    timeout-minutes: 20
    if: ${{ !cancelled() }}
    needs: []

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
      - name: Clean untracked files and directories (like old submodules)
        run: git clean -ffdx
      - name: run Tester sim-run
        run: |
          make clean;\
          make tester-sim-run

  lint-FUs:
    runs-on: self-hosted
    timeout-minutes: 10
    if: ${{ !cancelled() }}
    needs: []

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
      - name: Clean untracked files and directories (like old submodules)
        run: git clean -ffdx
      - name: lint all Versat FUs
        run: make lint-all-fus
